<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Form by umang </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: lightskyblue ;
background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp_rK0iy6s94sMm4q_jIzzSaCiJGI1nTuw6K-xERb4nECGT7ngG6BexDAq&s=10);
}

.box{
width:320px;
padding: 25px;
border-radius:15px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(20px);

box-shadow: 0 8px 32px rgba(0,0,0,0.3);
color: darkred;
}

h3{
text-align:center;
margin-bottom:20px;
text-decoration:underline;
color: ghostwhite;
}

.form-group{
margin-bottom:15px;
display:flex;
flex-direction: column;
color: white;
}

label{
margin-bottom:5px;
font-size:14px;
}

input,select{
padding:8px;
border:none;
border-radius:6px;
outline:none;
}

.gender{
display:flex;
gap:10px;
font-size:14px;
}

button{
margin-top:15px;
padding:10px;
border:none;
border-radius:8px;
background:red;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
width: 100%;
}

button:hover{
background:red;
transform:scale(1.05);
}

.dicrip{
margin-top:20px;
text-align:center;
color: white;
font-style:italic;
font-size:14px;
animation: float 3s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)
  
}
50%{transform:translateY(8px)
  
}
}

</style>
</head>

<body>

<div>
<div class="box">

<h3> competition Form </h3>

<form>

<div class="form-group">
<label>Name</label>
<input type="text" placeholder="Full Name">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" placeholder="Enter Age">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" placeholder="D.O.B">
</div>

<div class="form-group">
<label>Category</label>
<select>
<option>General</option>
<option>OBC</option>
<option>SC/ST</option>
</select>
</div>

<div class="form-group">
<label>Gender</label>

<div class="gender">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> other </label>
</div>

</div>

 <button>Submit</button>

</form>

</div>

<p class="dicrip">
by umang dubey 
</p>

</div>

</body>
</html>
