<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; 
            align-items: center;
             margin-top: 50px; 
             background-color: blueviolet;
             background-size: cover;
             background-repeat: no-repeat;
            background-attachment: fixed; 

            background-image: url("https://img.freepik.com/free-photo/gradient-iphone-wallpaper-oil-bubble-water-background_53876-176849.jpg?semt=ais_hybrid&w=740&q=80")
            
        
        
        }
        form { border: 1.5px solid #ccc; padding: 20px;
            margin-top: 40%;
           border-radius: 15px; 
            background: lightgrey;
            backdrop-filter: blur(100px);
   box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    
        }
           
        input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        h2 {
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
        }
        button {
            width: 100%;
            margin-top: 20px;
            border-radius: 15px;
            
        }
    </style>
</head>
<body>
    <form id="loginForm">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="message"></p>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
               if(user === 'admin' && pass === '1234') {
                msg.style.color = 'green';
                msg.textContent = 'Login successful';
            } else {
                msg.style.color = 'red';
             msg.textContent = 'galat password';
            }
        });
    </script>
</body>
</html>
